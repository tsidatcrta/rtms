<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMS Admin - Full Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .input-box { width: 100%; border: 1.5px solid #e2e8f0; padding: 0.75rem; border-radius: 1rem; outline: none; font-size: 14px; font-weight: 600; color: #1e293b !important; background-color: white !important; }
        .input-box:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .room-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #f1f5f9; background: white; border-radius: 2rem; overflow: hidden; display: flex; flex-direction: column; }
        .room-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .checkbox-item { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
        .checkbox-item.active { background-color: #4f46e5; border-color: #4f46e5; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const firebaseConfig = { apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk", authDomain: "rtcdb-66284.firebaseapp.com", projectId: "rtcdb-66284", storageBucket: "rtcdb-66284.firebasestorage.app", messagingSenderId: "800467259752", appId: "1:800467259752:web:961e90546df3390e2b06dd" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const seminarCol = db.collection('artifacts/military-system-v12/public/data/seminar');
        const guestsCol = db.collection('artifacts/military-system-v12/public/data/guests');
        const roomsCol = db.collection('artifacts/military-system-v12/public/data/rooms');
        const adminsCol = db.collection('artifacts/military-system-v12/public/data/admins');
        const configCol = db.collection('artifacts/military-system-v12/public/data/config');

        const ROLES_CONFIG = {
            SUPER_ADMIN:   { label: 'ทั้งหมด',           color: 'bg-rose-500 text-white' },
            SEMINAR:       { label: 'สัมมนา',             color: 'bg-indigo-500 text-white' },
            ACCOMMODATION: { label: 'ที่พัก',       color: 'bg-emerald-500 text-white' },
            UNITS:         { label: 'หน่วย',    color: 'bg-amber-500 text-white' },
            VIEWER:        { label: 'ดูอย่างเดียว',   color: 'bg-slate-400 text-white' }
        };

        // รายการยศทหารบกครบถ้วน
        const RANKS = ["พล.อ.", "พล.ท.", "พล.ต.", "พ.อ. (พิเศษ)", "พ.อ.", "พ.ท.", "พ.ต.", "ร.อ.", "ร.ท.", "ร.ต.", "จ.ส.อ. (พิเศษ)", "จ.ส.อ.", "จ.ส.ท.", "จ.ส.ต.", "ส.อ.", "ส.ท.", "ส.ต.", "อื่นๆ"];

        const getPersonUrl = (p) => p && p.id ? `${window.location.origin}${window.location.pathname}?p=${p.id}` : "";
        
        const QRCodeDisplay = ({ url, size = 160 }) => {
            const qrRef = useRef(null);
            useEffect(() => {
                if (qrRef.current && url && typeof QRCode !== 'undefined') {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: url, width: size, height: size, colorDark: "#1e293b", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
                }
            }, [url, size]);
            return <div ref={qrRef} className="bg-white p-2 rounded-xl border border-slate-100"></div>;
        };

        const App = () => {
            const [adminProfile, setAdminProfile] = useState(null);
            const [mode, setMode] = useState('guest');
            const [guestSubTab, setGuestSubTab] = useState('request');
            const [adminSubTab, setAdminSubTab] = useState('requests');
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [list, setList] = useState([]);
            const [rooms, setRooms] = useState([]);
            const [guests, setGuests] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [accSearchTerm, setAccSearchTerm] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [isConfirming, setIsConfirming] = useState(false);
            const [selectedPerson, setSelectedPerson] = useState(null);
            const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [currentEditItem, setCurrentEditItem] = useState(null);
            const [guestForm, setGuestForm] = useState({ rank: '', rankOther: '', firstName: '', lastName: '', nickname: '', position: '', category: 'กองอำนวยการ', phone: '', roomId: '', unit: '', seminarYear: '', seminarPeriod: ''});
            
            const [displayConfig, setDisplayConfig] = useState({ sortBy: 'unit', order: 'asc', filterPeriod: 'all', logoUrl: '' });
            const [filterYear, setFilterYear] = useState(new Date().getFullYear() + 543);
            const [filterPeriod, setFilterPeriod] = useState("");
            const [reportTitle, setReportTitle] = useState("บัญชีรายชื่อจัดที่พัก RTMS");

            useEffect(() => {
                const saved = localStorage.getItem('rtms_admin_session');
                if (saved) setAdminProfile(JSON.parse(saved));
                const unsubS = seminarCol.onSnapshot(s => setList(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubR = roomsCol.onSnapshot(s => setRooms(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubG = guestsCol.onSnapshot(s => setGuests(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubC = configCol.doc('displaySettings').onSnapshot(doc => { if (doc.exists) setDisplayConfig(doc.data()); });
                return () => { unsubS(); unsubR(); unsubG(); unsubC(); };
            }, []);

            const pendingPairs = useMemo(() => {
                const pairs = []; const seen = new Set();
                list.filter(p => (p.roomStatus === 'รออนุมัติ' || (p.roomStatus === 'อนุมัติแล้ว' && p.roomId && p.roomId.startsWith('BK-'))) && p.pendingPairWith).forEach(p => {
                    if (!seen.has(p.docId)) {
                        const partner = list.find(pt => pt.docId === p.pendingPairWith);
                        if (partner) {
                            pairs.push({ p1: p, p2: partner });
                            seen.add(p.docId); seen.add(partner.docId);
                        }
                    }
                });
                return pairs;
            }, [list]);

// ✅ แก้ไข: ฟังก์ชันบันทึกเลขห้องให้แม่นยำและรองรับกองอำนวยการ
            const assignRoom = async (personDocId, roomNo, type = 'seminar') => {
                try {
                    const person = [...list, ...guests].find(i => i.docId === personDocId || i.id === personDocId);
                    if (!person) return;

                    // กรณีคนที่มีคู่ (สถานะรออนุมัติ หรือ จอง BK-) ให้ไปทั้งคู่
                    if (person.pendingPairWith) {
                        const batch = db.batch();
                        const partner = list.find(p => p.docId === person.pendingPairWith);
                        
                        // อัปเดตคนที่ 1
                        batch.update(seminarCol.doc(person.docId), { 
                            roomId: roomNo, 
                            roomStatus: roomNo ? 'อนุมัติแล้ว' : 'ปกติ' 
                        });
                        
                        // อัปเดตคู่ (ถ้ามี)
                        if (partner) {
                            batch.update(seminarCol.doc(partner.docId), { 
                                roomId: roomNo, 
                                roomStatus: roomNo ? 'อนุมัติแล้ว' : 'ปกติ' 
                            });
                        }
                        await batch.commit();
                    } else {
                        // กรณีคนโสด หรือกองอำนวยการ
                        const colRef = (person.category === 'กองอำนวยการ' || person.category === 'วิทยากร') ? guestsCol : seminarCol;
                        await colRef.doc(person.docId).update({ 
                            roomId: roomNo, 
                            roomStatus: roomNo ? 'อนุมัติแล้ว' : 'ปกติ' 
                        });
                    }
                } catch (error) {
                    console.error("Error assigning room:", error);
                    alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                }
            };

            const assignRealRoomToPair = async (pair, roomNo) => {
                if (!roomNo) return;
                const batch = db.batch();
                batch.update(seminarCol.doc(pair.p1.docId), { roomId: roomNo, roomStatus: 'อนุมัติแล้ว' });
                batch.update(seminarCol.doc(pair.p2.docId), { roomId: roomNo, roomStatus: 'อนุมัติแล้ว' });
                await batch.commit();
            };

            const saveDisplayConfig = async (newConfig) => {
                await configCol.doc('displaySettings').set(newConfig);
                alert("✅ บันทึกมุมมองเรียบร้อย");
            };
            const handleLogin = async (e) => {
                e.preventDefault();
                const snap = await adminsCol.where('username', '==', loginForm.user).where('password', '==', loginForm.pass).get();
                if (!snap.empty) {
                    const data = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    setAdminProfile(data);
                    localStorage.setItem('rtms_admin_session', JSON.stringify(data));
                    setMode('admin');
                } else { alert("❌ ข้อมูลไม่ถูกต้อง"); }
            };

            const handleSelect = (person) => {
                if (selectedIds.includes(person.docId)) { 
                    setSelectedIds(selectedIds.filter(id => id !== person.docId)); 
                } else if (selectedIds.length < 2) { 
                    if (person.roomStatus === 'รออนุมัติ' || person.roomStatus === 'อนุมัติแล้ว') {
                        alert("⚠️ ไม่สามารถเลือกได้"); return;
                    }
                    setSelectedIds([...selectedIds, person.docId]); 
                }
            };

            const submitPairing = async () => {
                const batch = db.batch();
                batch.update(seminarCol.doc(selectedIds[0]), { roomStatus: 'รออนุมัติ', pendingPairWith: selectedIds[1] });
                batch.update(seminarCol.doc(selectedIds[1]), { roomStatus: 'รออนุมัติ', pendingPairWith: selectedIds[0] });
                await batch.commit();
                setSelectedIds([]); setIsConfirming(false); setGuestSubTab('pending');
                alert("✅ ส่งคำร้องสำเร็จ");
            };

            const uniquePeriods = useMemo(() => [...new Set(list.map(i => String(i.seminarPeriod || "")))].filter(Boolean).sort(), [list]);

const filteredList = useMemo(() => {
    // 1. กรองด้วย Search Term ก่อน
    let result = list.filter(i => 
        `${i.firstName} ${i.lastName} ${i.unitName} ${i.id}`.toLowerCase().includes(searchTerm.toLowerCase())
    );

    // 2. ✅ แก้ไขการกรองผลัดให้รองรับ "all" และรูปแบบข้อความที่หลากหลาย
    // ถ้าค่าเป็น "all" หรือ ว่างเปล่า ให้ข้ามการกรองผลัดไปเลย (แสดงทั้งหมด)
    if (displayConfig.filterPeriod !== 'all' && displayConfig.filterPeriod !== "") {
        result = result.filter(i => {
            const pVal = String(i.seminarPeriod || "");
            const filterVal = String(displayConfig.filterPeriod);
            
            // ตรวจสอบให้ครอบคลุม: ถ้าค่าใน DB คือ "1" แต่ filter คือ "ผลัดที่ 1" หรือสลับกันให้เจอหมด
            return pVal === filterVal || 
                   pVal === `ผลัดที่ ${filterVal}` || 
                   `ผลัดที่ ${pVal}` === filterVal;
        });
    }

    // 3. จัดเรียงลำดับ (Sorting)
    result.sort((a, b) => {
        let valA, valB;
        if (displayConfig.sortBy === 'unit') {
            valA = a.unitName || ""; valB = b.unitName || "";
        } else if (displayConfig.sortBy === 'id') {
            valA = a.id || ""; valB = b.id || "";
        } else {
            // ดึงเฉพาะตัวเลขออกมาเพื่อเรียงลำดับผลัด
            valA = parseInt(String(a.seminarPeriod || "").replace(/\D/g, '')) || 0;
            valB = parseInt(String(b.seminarPeriod || "").replace(/\D/g, '')) || 0;
        }
        const factor = displayConfig.order === 'asc' ? 1 : -1;
        return typeof valA === 'string' 
            ? valA.localeCompare(valB, 'th') * factor 
            : (valA - valB) * factor;
    });

    return result;
}, [list, searchTerm, displayConfig]);

            const exportToCSV = () => {
                const headers = ["ลำดับ", "ห้อง", "หน่วย", "ยศ", "ชื่อ", "นามสกุล", "เบอร์โทร"];
                const allData = [...list, ...guests];
                const csvContent = [headers, ...allData.map((item, idx) => [
                    idx + 1, item.roomId || '', item.unitName || item.unit || '', 
                    item.rank === 'อื่นๆ' ? item.rankOther : item.rank, 
                    item.firstName, item.lastName, item.phone || ''
                ])].map(e => e.join(",")).join("\n");
                const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `RTMS_Export_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            // ✅ ฟังก์ชันใหม่: Export ข้อมูลทั้งหมด (Full Data) สำหรับงาน Database/Excel
            const exportFullDataToCSV = () => {
                const headers = [
                    "ลำดับ", "ประเภทบุคคล", "ID", "ยศ", "ชื่อ", "นามสกุล", 
                    "ชื่อเล่น", "ตำแหน่ง", "หน่วยงาน", "ปี", "ผลัด", 
                    "เลขห้อง", "เบอร์โทร", "สถานะห้อง", "คู่ที่พัก(ID)"
                ];

                const allData = [
                    ...list.map(i => ({ ...i, pType: 'ผู้เข้าร่วมสัมมนา' })),
                    ...guests.map(i => ({ ...i, pType: i.category || 'กองอำนวยการ' }))
                ];

                const csvContent = [
                    headers.join(","),
                    ...allData.map((item, idx) => [
                        idx + 1,
                        `"${item.pType}"`,
                        `"${item.id}"`,
                        `"${item.rank === 'อื่นๆ' ? item.rankOther : item.rank}"`,
                        `"${item.firstName}"`,
                        `"${item.lastName}"`,
                        `"${item.nickname || ''}"`,
                        `"${item.position || ''}"`,
                        `"${item.unitName || item.unit || ''}"`,
                        `"${item.seminarYear || ''}"`,
                        `"${item.seminarPeriod || ''}"`,
                        `"${item.roomId || ''}"`,
                        // ✅ แก้ไขตรงนี้: บังคับให้เป็นข้อความด้วยรูปแบบสูตร Excel
                        `"=""${item.phone || ''}"""`,
                        `"${item.roomStatus || ''}"`,
                        `"${item.pendingPairWith || ''}"`
                    ].map(val => String(val).replace(/,/g, ' ')).join(","))
                ].join("\n");

                const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `RTMS_DATABASE_FULL_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
            };

            const printReport = () => {
                const w = window.open('', '_blank');
                const filteredData = [...list, ...guests].filter(item => {
                    const matchYear = !filterYear || String(item.seminarYear) === String(filterYear);
                    const matchPeriod = !filterPeriod || String(item.seminarPeriod || "").includes(String(filterPeriod));
                    return matchYear && matchPeriod;
                });
                const rows = filteredData.map((item, idx) => `
                    <tr>
                        <td style="text-align:center;">${idx + 1}</td>
                        <td style="text-align:center;font-weight:bold;">${item.roomId || '-'}</td>
                        <td>${item.unitName || item.unit || '-'}</td>
                        <td>${item.rank === 'อื่นๆ' ? item.rankOther : item.rank} ${item.firstName} ${item.lastName}</td>
                        <td>${item.phone || '-'}</td>
                        <td style="width:150px;"></td>
                    </tr>`).join('');
                w.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); body{font-family:'Sarabun',sans-serif;padding:40px;} table{width:100%;border-collapse:collapse;margin-top:20px;} th,td{border:1px solid black;padding:10px;font-size:14px;} th{background:#f2f2f2;}</style></head><body><h2 style="text-align:center">${reportTitle}</h2><p style="text-align:center">ปี ${filterYear} ${filterPeriod?'รุ่นที่ '+filterPeriod:''}</p><table><thead><tr><th>ลำดับ</th><th>ห้อง</th><th>หน่วย</th><th>ชื่อ-นามสกุล</th><th>โทรศัพท์</th><th>ลงชื่อ</th></tr></thead><tbody>${rows}</tbody></table><script>window.print();<\/script></body></html>`);
                w.document.close();
            };

            const handleSaveGuest = async (e) => {
                e.preventDefault();
                if (isEditMode) { await guestsCol.doc(currentEditItem.docId).update(guestForm); }
                else { await guestsCol.add({ ...guestForm, id: `G-${Date.now().toString().slice(-4)}`, createdAt: new Date().toISOString() }); }
                setIsGuestModalOpen(false);
            };

// --- เริ่มต้นส่วน Logic ที่เพิ่มใหม่ ---

            // 1. ฟังก์ชันนำเข้าห้องพักจาก CSV
            const handleImportRoomsCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const text = event.target.result;
                        const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
                        const dataRows = rows.slice(1);
                        if (!confirm(`ยืนยันการนำเข้าข้อมูลห้องพักจำนวน ${dataRows.length} ห้อง?`)) return;
                        const batch = db.batch();
                        let count = 0;
                        dataRows.forEach(row => {
                            const columns = row.split(',');
                            const roomNo = columns[0]?.trim();
                            let type = columns[1]?.trim();
                            if (roomNo && type) {
                                if (type.includes("เดี่ยว")) type = "พักเดี่ยว";
                                if (type.includes("รวม")) type = "พักรวม";
                                const newDocRef = roomsCol.doc();
                                batch.set(newDocRef, { roomNo: roomNo, type: type });
                                count++;
                            }
                        });
                        await batch.commit();
                        alert(`✅ นำเข้าห้องพักสำเร็จ ${count} ห้อง!`);
                        e.target.value = null;
                    } catch (err) { alert("❌ รูปแบบไฟล์ไม่ถูกต้อง"); }
                };
                reader.readAsText(file, 'UTF-8');
            };

            // 2. ฟังก์ชันส่งออกรายชื่อห้องพัก
            const exportRoomsListCSV = () => {
                const headers = ["เลขห้องพัก", "ประเภทห้อง"];
                const sortedRooms = [...rooms].sort((a,b) => a.roomNo.localeCompare(b.roomNo, undefined, {numeric: true}));
                const csvContent = [headers.join(","), ...sortedRooms.map(r => [`"${r.roomNo}"`, `"${r.type}"`].join(","))].join("\n");
                const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `RTMS_ROOMS_LIST.csv`;
                link.click();
            };

            // 3. ฟังก์ชันล้างที่พักทุกคน
            const resetAllAccommodationData = async () => {
                if (!confirm("⚠️ คำเตือน: ล้างข้อมูลห้องและคู่ของ 'ทุกคน' ในระบบ?")) return;
                if (!confirm("ยืนยันครั้งสุดท้าย? ข้อมูลจะหายทั้งหมด!")) return;
                try {
                    const batch = db.batch();
                    const resetData = { roomId: firebase.firestore.FieldValue.delete(), roomStatus: 'ปกติ', pendingPairWith: firebase.firestore.FieldValue.delete() };
                    list.forEach(p => { batch.update(seminarCol.doc(p.docId), resetData); });
                    guests.forEach(g => { batch.update(guestsCol.doc(g.docId), resetData); });
                    await batch.commit();
                    alert("✅ ล้างข้อมูลเรียบร้อยแล้ว");
                } catch (error) { alert("เกิดข้อผิดพลาด"); }
            };

            return (
                <div className="min-h-screen flex flex-col text-slate-800 font-sarabun">
                    <header className="bg-slate-900 text-white sticky top-0 z-[60] shadow-xl border-b border-white/10">
    {/* แถวบน: Logo และกลุ่มแอดมิน/เครื่องมือ */}
    <div className="flex justify-between items-center px-4 py-3 bg-gradient-to-b from-slate-900 to-slate-800">
{/* ฝั่งซ้าย: Logo และชื่อหน่วยงาน */}
<div className="flex items-center gap-3 overflow-hidden" onClick={() => handleNav('seminar')}>
    {/* แทนที่ไอคอนโล่ด้วยรูปภาพที่อัปโหลด */}
    <div className="shrink-0">
        <img
