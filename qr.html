<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTMS Check-in Station v1.3.2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; height: 100vh; }
        /* สัดส่วนหน้าจอ: กล้องอยู่บน */
        #reader { width: 100% !important; border: none !important; background: #000; height: 60vh !important; }
        #reader video { object-fit: cover !important; height: 60vh !important; width: 100% !important; }
        
        .scan-line { animation: scan 2s linear infinite; height: 2px; background: #10b981; box-shadow: 0 0 15px #10b981; z-index: 20; position: absolute; left: 0; right: 0; top: 30vh; pointer-events: none; }
        @keyframes scan { 0% { transform: translateY(-10vh); } 100% { transform: translateY(20vh); } }

        /* ผลลัพธ์แบบลอย */
        .result-overlay { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .result-overlay.active { transform: translateY(0); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <div class="relative w-full h-[60vh] bg-black overflow-hidden">
        <div id="reader"></div>
        <div class="scan-line"></div>
        
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-30 bg-gradient-to-b from-black/70 to-transparent">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-1.5 rounded-lg shadow-lg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter">RTMS <span class="text-blue-400">CHECK-IN</span></h1>
                </div>
            </div>
            <button onclick="exportCheckInCSV()" class="bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-[9px] font-black uppercase shadow-lg">💾 CSV</button>
        </div>

        <button onclick="switchCameraMode()" class="absolute bottom-4 right-4 z-30 bg-white/20 backdrop-blur-md p-3 rounded-full border border-white/30 active:scale-90 transition-all">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
    </div>

    <div class="flex-1 bg-slate-900 rounded-t-[2.5rem] -mt-8 z-40 p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col">
        <div class="flex gap-4 mb-4 border-b border-white/5 pb-2">
            <button onclick="switchTab('logs')" id="tab-logs-btn" class="text-xs font-black uppercase tracking-widest text-blue-400 border-b-2 border-blue-400 pb-2">Recent Logs</button>
            <button onclick="switchTab('settings')" id="tab-settings-btn" class="text-xs font-black uppercase tracking-widest text-slate-500 pb-2">Camera Settings</button>
        </div>

        <div id="tab-logs" class="tab-content active flex-1 overflow-y-auto">
            <div id="log-list" class="space-y-2 pb-4">
                <p class="text-[10px] text-gray-500 text-center py-10 italic uppercase tracking-widest">Ready to scan</p>
            </div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="space-y-4">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">เลือกอุปกรณ์ (Hardware)</label>
                    <select id="camera-select" class="w-full bg-slate-950 text-white text-xs px-4 py-3 rounded-xl border border-white/10 outline-none mb-3"></select>
                    <button onclick="requestPermission()" class="w-full bg-indigo-600 text-white py-3 rounded-xl text-xs font-black uppercase shadow-xl active:bg-indigo-700">โหลดรายชื่อกล้องใหม่</button>
                </div>
                <div class="text-center">
                    <p id="status-text" class="text-[10px] font-bold text-indigo-400 uppercase italic">สถานะ: แสตนด์บาย</p>
                </div>
            </div>
        </div>
    </div>

    <div id="result-overlay" class="result-overlay fixed bottom-0 left-0 w-full z-[100] p-6">
        <div class="bg-white rounded-[2rem] p-6 shadow-[0_-10px_50px_rgba(0,0,0,0.3)] text-slate-900 flex flex-col items-center animate-pulse-slow">
            <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2 id="res-name" class="text-xl font-black mb-1">---</h2>
            <p id="res-unit" class="text-indigo-600 font-bold text-[11px] uppercase tracking-widest mb-4">---</p>
            
            <div class="w-full grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                <div class="text-center border-r border-slate-100">
                    <p class="text-[9px] font-black text-slate-400 uppercase">ประเภท</p>
                    <p id="res-type" class="text-xs font-bold text-slate-700">-</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">เวลาสแกน</p>
                    <p id="res-time" class="text-xs font-bold text-emerald-600">-</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = "military-system-v12";

        let html5Qr;
        let isProcessing = false;
        let currentFacingMode = "environment"; // เริ่มต้นด้วยกล้องหลัง

        // --- ระบบจัดการกล้อง ---
        async function requestPermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());
                await getCameras();
                startScanner();
            } catch (err) { alert("กรุณาอนุญาตใช้งานกล้อง"); }
        }

        async function getCameras() {
            const devices = await Html5Qrcode.getCameras();
            const select = document.getElementById('camera-select');
            if (devices && devices.length > 0) {
                select.innerHTML = devices.map((d, i) => `<option value="${d.id}">${d.label || 'Camera '+i}</option>`).join('');
            }
        }

        function switchCameraMode() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startScanner();
        }

        function startScanner() {
            const cameraId = document.getElementById('camera-select').value;
            if (html5Qr) {
                html5Qr.stop().then(() => doStart(cameraId)).catch(() => doStart(cameraId));
            } else {
                doStart(cameraId);
            }
        }

        function doStart(cameraId) {
            html5Qr = new Html5Qrcode("reader");
            const config = { 
                fps: 25, 
                qrbox: (w,h) => ({ width: w*0.8, height: w*0.8 }),
                aspectRatio: 1.0,
                videoConstraints: { facingMode: currentFacingMode } // บังคับสลับ หน้า/หลัง ที่นี่
            };
            
            html5Qr.start({ facingMode: currentFacingMode }, config, onScanSuccess)
            .then(() => { 
                document.getElementById('status-text').innerText = `ACTIVE: ${currentFacingMode.toUpperCase()} CAMERA`;
            })
            .catch(err => { 
                // หากรหัสกล้องเฉพาะมีปัญหา ให้ใช้ facingMode แทน
                html5Qr.start({ facingMode: currentFacingMode }, config, onScanSuccess);
            });
        }

        // --- ระบบประมวลผล ---
        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                let personId = decodedText.includes('?p=') ? decodedText.split('?p=')[1].split('&')[0].trim() : decodedText.trim();
                let personData = null;
                let colName = '';

                // ค้นหาข้อมูล
                const semDoc = await db.collection(`artifacts/${appId}/public/data/seminar`).doc(personId).get();
                if (semDoc.exists) { personData = semDoc.data(); colName = 'Seminar'; }
                else {
                    const guestDoc = await db.collection(`artifacts/${appId}/public/data/guests`).doc(personId).get();
                    if (guestDoc.exists) { personData = guestDoc.data(); colName = personData.category || 'Guest'; }
                }

                if (personData) {
                    const now = new Date();
                    const name = `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`;
                    const unit = personData.unitName || personData.unit || '-';

                    // แสดงหน้าต่างลอย
                    document.getElementById('res-name').innerText = name;
                    document.getElementById('res-unit').innerText = unit;
                    document.getElementById('res-type').innerText = colName;
                    document.getElementById('res-time').innerText = now.toLocaleTimeString('th-TH');
                    document.getElementById('result-overlay').classList.add('active');

                    // บันทึก Firebase
                    await db.collection(`artifacts/${appId}/public/data/checkins`).add({
                        personId: personId, name: name, unit: unit, type: colName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        checkInDate: now.toLocaleString('th-TH')
                    });

                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    loadRecentLogs();

                    setTimeout(() => {
                        document.getElementById('result-overlay').classList.remove('active');
                        isProcessing = false;
                    }, 2500);
                } else {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2873/2873-preview.mp3').play();
                    setTimeout(() => { isProcessing = false; }, 1500);
                }
            } catch (error) { isProcessing = false; }
        }

        // --- ระบบ UI & Tabs ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button[id$="-btn"]').forEach(b => {
                b.classList.remove('text-blue-400', 'border-b-2', 'border-blue-400');
                b.classList.add('text-slate-500');
            });

            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}-btn`).classList.add('text-blue-400', 'border-b-2', 'border-blue-400');
            document.getElementById(`tab-${tab}-btn`).classList.remove('text-slate-500');
        }

        async function loadRecentLogs() {
            const logList = document.getElementById('log-list');
            try {
                const snap = await db.collection(`artifacts/${appId}/public/data/checkins`)
                                   .orderBy('timestamp', 'desc').limit(10).get();
                if (snap.empty) return;
                logList.innerHTML = snap.docs.map(doc => `
                    <div class="log-item bg-slate-800/40 p-3 rounded-2xl border border-white/5 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-white">${doc.data().name}</span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase">${doc.data().unit} | ${doc.data().type}</span>
                        </div>
                        <span class="text-[10px] font-black text-emerald-400">${doc.data().checkInDate.split(' ')[1]}</span>
                    </div>
                `).join('');
            } catch (err) {}
        }

        async function exportCheckInCSV() {
            try {
                const snap = await db.collection(`artifacts/${appId}/public/data/checkins`).orderBy('timestamp', 'desc').get();
                const data = snap.docs.map(doc => ({
                    "รหัส": doc.data().personId, "ชื่อ-นามสกุล": doc.data().name, "หน่วยงาน": doc.data().unit,
                    "ประเภท": doc.data().type, "เวลาเช็คอิน": doc.data().checkInDate
                }));
                const csv = Papa.unparse(data);
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' }));
                a.download = `RTMS_CheckIn_Data.csv`; a.click();
            } catch (err) { alert("Error Exporting"); }
        }

        window.onload = () => {
            requestPermission();
            loadRecentLogs();
        };
    </script>
</body>
</html>
