<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMS v12.5 - Full Integrity & Smart Mapping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .input-box { width: 100%; border: 1.5px solid #e2e8f0; padding: 0.6rem 0.8rem; border-radius: 0.75rem; outline: none; font-size: 14px; font-weight: 600; background: #fff; }
        .input-box:focus { border-color: #4f46e5; ring: 3px rgba(79, 70, 229, 0.1); }
        .section-box { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        .section-title { font-size: 12px; font-weight: 800; color: #4f46e5; margin-bottom: 0.4rem; text-transform: uppercase; border-left: 4px solid #4f46e5; padding-left: 8px; }
        .admin-section { background: #fff1f2; border-color: #fecaca; }
        .admin-title { color: #e11d48; border-left-color: #e11d48; }
        .modal-scroll { max-height: 75vh; overflow-y: auto; scrollbar-width: thin; }
        .dup-top-bar { background: #fff7ed; color: #c2410c; border-bottom: 1px solid #fed7aa; padding: 8px 16px; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .dup-top-bar:hover { background: #ffedd5; }
        .sidebar-btn { padding: 0.75rem 1.25rem; border-radius: 1rem; font-weight: 700; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .sidebar-btn.active { background-color: #4f46e5; color: white; }
        .sort-btn { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; transition: all 0.2s; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .sort-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            storageBucket: "rtcdb-66284.firebasestorage.app",
            messagingSenderId: "800467259752",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const seminarCol = db.collection('artifacts/military-system-v12/public/data/seminar');
        const unitsCol = db.collection('artifacts/military-system-v12/public/data/units');

        const App = () => {
            const [user, setUser] = useState(null);
            const [list, setList] = useState([]);
            const [units, setUnits] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingData, setEditingData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [dupFilter, setDupFilter] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'ประทับเวลา', direction: 'desc' });

            useEffect(() => { return auth.onAuthStateChanged(u => setUser(u)); }, []);
            useEffect(() => {
                if (!user) return;
                seminarCol.onSnapshot(s => setList(s.docs.map(d => ({id: d.id, ...d.data()}))));
                unitsCol.onSnapshot(s => setUnits(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, [user]);

            const getUnitCode = (str) => str?.toString().split(':')[0]?.trim() || "";

            const listWithDupInfo = useMemo(() => {
                return list.map((item, index) => {
                    let dupFields = [];
                    const isDup = list.some((other, otherIdx) => {
                        if (index === otherIdx) return false;
                        let found = false;
                        if (item.id && item.id === other.id) { dupFields.push('ID'); found = true; }
                        if (item.unitName && item.unitName === other.unitName) { dupFields.push('หน่วย'); found = true; }
                        if (item.phone && item.phone === other.phone) { dupFields.push('เบอร์โทร'); found = true; }
                        if (item.firstName && item.lastName && (item.firstName+item.lastName).replace(/\s/g,'') === (other.firstName+other.lastName).replace(/\s/g,'')) { dupFields.push('ชื่อ-สกุล'); found = true; }
                        return found;
                    });
                    return { ...item, isDupLocal: isDup, dupReason: dupFields.join(', '), dupFieldsList: dupFields };
                });
            }, [list]);

    const processedList = useMemo(() => {
    let items = [...listWithDupInfo];

    // 1. การค้นหา (Search)
    if (searchTerm) {
        items = items.filter(i => 
            `${i.id} ${i.firstName} ${i.lastName} ${i.unitName}`.toLowerCase().includes(searchTerm.toLowerCase())
        );
    }

    // 2. การกรอง (Filter) ข้อมูลซ้ำ
    if (dupFilter) {
        if (dupFilter.dupOnly) {
            // โหมด: แสดงเฉพาะรายการที่ซ้ำทั้งหมด
            items = items.filter(i => i.isDupLocal);
        } else {
            // โหมด: แสดงเฉพาะคู่ซ้ำของคนที่เลือก (Deep Inspect เมื่อกดแถบส้ม)
            const filterFullName = (dupFilter.firstName + dupFilter.lastName).replace(/\s/g, '');
            items = items.filter(i => {
                const iFullName = (i.firstName + i.lastName).replace(/\s/g, '');
                return (dupFilter.dupFieldsList.includes('ID') && i.id === dupFilter.id) ||
                       (dupFilter.dupFieldsList.includes('หน่วย') && i.unitName === dupFilter.unitName) ||
                       (dupFilter.dupFieldsList.includes('เบอร์โทร') && i.phone === dupFilter.phone) ||
                       (dupFilter.dupFieldsList.includes('ชื่อ-สกุล') && iFullName === filterFullName);
            });
        }
    }

    // 3. การเรียงลำดับ (Sorting) ตามที่เพื่อนต้องการ
    items.sort((a, b) => {
        let valA = a[sortConfig.key] || "";
        let valB = b[sortConfig.key] || "";

        // กรณีเรียงตามเลขหน่วย (ตัดเอาตัวเลขข้างหน้ามาเทียบ)
        if (sortConfig.key === 'เลขหน่วย') {
            valA = getUnitCode(a.unitName);
            valB = getUnitCode(b.unitName);
        }

        // เปรียบเทียบค่า
        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
    });

    return items;
}, [listWithDupInfo, searchTerm, dupFilter, sortConfig]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            // ✅ ฟังก์ชันอิมพอร์ตใหม่ แก้ปัญหา ID หาย และ Mapping ตามเงื่อนไขเป๊ะ
            const handleImportCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);

                Papa.parse(file, {
                    header: true, skipEmptyLines: true,
                    complete: async (res) => {
                        const now = new Date().toLocaleString('th-TH');
                        const getVal = (row, keys) => {
                            for (let key of keys) if (row[key] !== undefined && row[key] !== null && row[key] !== "") return row[key].toString().trim();
                            return "";
                        };

                        // 🔍 หาเลขรัน ID สูงสุดจากทั้งใน DB และในไฟล์ CSV ที่กำลังจะเข้า
                        const getNumericId = (idStr) => {
                            const m = idStr?.match(/^p(\d+)$/i);
                            return m ? parseInt(m[1]) : 0;
                        };

                        const dbMax = Math.max(0, ...list.map(i => getNumericId(i.id)));
                        const fileMax = Math.max(0, ...res.data.map(r => getNumericId(getVal(r, ["id", "ID", "p0001"]))));
                        let currentRunningMax = Math.max(dbMax, fileMax);

                        const chunks = [];
                        for (let i = 0; i < res.data.length; i += 500) chunks.push(res.data.slice(i, i + 500));

                        try {
                            let successCount = 0;
                            for (const chunk of chunks) {
                                const batch = db.batch();
                                chunk.forEach(row => {
                                    let id = getVal(row, ["id", "ID", "p0001"]).toLowerCase();
                                    
                                    // ⚠️ ถ้า ID ว่าง ให้ Gen ใหม่รันต่อจากเลขสูงสุด
                                    if (!id || id === "") {
                                        currentRunningMax++;
                                        id = `p${currentRunningMax.toString().padStart(4, '0')}`;
                                    }

                                    const mappedData = {
                                        id: id,
                                        ประทับเวลา: getVal(row, ["ประทับเวลา", "สร้างเมื่อ", "createdAt"]),
                                        // ✅ เพิ่ม Mapping คอลัมน์ ผลัดที่ และ ปีสัมมนา
                                        seminarPeriod: getVal(row, ["ผลัดที่", "period", "seminarPeriod"]),
                                        seminarYear: getVal(row, ["ปีสัมมนา", "seminarYear"]),
                                        updatedAt: now,
                                        region: (() => {
                                            const r = getVal(row, ["กองทัพภาค", "region"]);
                                            if (r.includes("ทภ.1")) return "ทภ.1";
                                            if (r.includes("ทภ.2")) return "ทภ.2";
                                            if (r.includes("ทภ.3")) return "ทภ.3";
                                            if (r.includes("ทภ.4")) return "ทภ.4";
                                            if (r.includes("นขต.ทบ.")) return "นขต.ทบ.";
                                            return r;
                                        })(),
                                        unitName: getVal(row, ["หน่วย", "unitName"]),
                                        rank: getVal(row, ["ยศ", "rank"]),
                                        firstName: getVal(row, ["ชื่อ", "firstName"]),
                                        lastName: getVal(row, ["สกุล", "lastName"]),
                                        nickname: getVal(row, ["ชื่อเล่น", "nickname"]),
                                        phone: getVal(row, ["เบอร์มือถือ", "phone"]),
                                        lineId: getVal(row, ["Line ID", "lineId"]),
                                        position: getVal(row, ["ตำแหน่ง", "position"]),
                                        // ✅ Mapping กำเนิด (origin) ตามเงื่อนไข
                                        origin: (() => {
                                            const rawO = getVal(row, ["กำเนิด", "origin"]);
                                            if (rawO === "นตท." || rawO === "นนส.") return rawO;
                                            return "อื่นๆ";
                                        })(),
                                        originOther: (() => {
                                            const rawO = getVal(row, ["กำเนิด", "origin"]);
                                            if (rawO !== "นตท." && rawO !== "นนส.") return rawO;
                                            return getVal(row, ["กำเนิดอื่น", "originOther"]);
                                        })(),
                                        batch: getVal(row, ["รุ่น", "batch"]),
                                        year: getVal(row, ["ปี", "year", "ปี พ.ศ."]),
                                        npBatch: getVal(row, ["นป. รุ่น", "npBatch"]),
                                        npYear: getVal(row, ["นป. ปี", "npYear"]),
                                        trainingExp: getVal(row, ["ประสบการณ์การเป็นผู้ฝึกทหารใหม่", "ประสบการณ์ฝึก", "trainingExp"]),
                                        // ✅ Mapping การเดินทาง ตามเงื่อนไข
                                        travelBy: (() => {
                                            const rawT = getVal(row, ["การเดินทาง", "travelBy"]);
                                            if (rawT.includes("รถบัสโดยสาร")) return "รถรวม";
                                            if (rawT.includes("รถยนต์ส่วนบุคคล")) return "รถส่วนตัว";
                                            return rawT;
                                        })(),
                                        // ✅ Mapping การขอห้องพัก ตามเงื่อนไข
                                        roomTypePref: (() => {
                                            const rawR = getVal(row, ["การขอห้องพัก", "roomTypePref"]);
                                            if (rawR.includes("พักรวม")) return "พักรวม";
                                            if (rawR.includes("ประสงค์พักห้องเดี่ยว")) return "พักเดี่ยว";
                                            return rawR;
                                        })(),
                                        paymentStatus: getVal(row, ["ชำระห้องเดี่ยว", "paymentStatus"]) || "ยังไม่จ่าย",
                                        dietary: getVal(row, ["การรับประทานอาหาร", "dietary"]),
                                        remarks: getVal(row, ["หมายเหตุ", "remarks"]),
                                        roomId: getVal(row, ["roomID", "roomId"]),
                                        disbursement: getVal(row, ["เบิก", "disbursement"]) || "เบิกไม่ได้",
                                    };
                                    batch.set(seminarCol.doc(id), mappedData, { merge: true });
                                    successCount++;
                                });
                                await batch.commit();
                            }
                            alert(`นำเข้าสำเร็จครบถ้วน ${successCount} รายการ!`);
                        } catch (err) { alert(err.message); }
                        finally { setLoading(false); e.target.value = null; }
                    }
                });
            };

            const handleBatchDelete = async (ids) => {
                if (!ids.length || !confirm(`ลบ ${ids.length} รายการ?`)) return;
                setLoading(true);
                const chunks = [];
                for (let i = 0; i < ids.length; i += 500) chunks.push(ids.slice(i, i + 500));
                for (const chunk of chunks) {
                    const batch = db.batch();
                    chunk.forEach(id => batch.delete(seminarCol.doc(id)));
                    await batch.commit();
                }
                setSelectedIds([]);
                setLoading(false);
            };

            const handleSaveEdit = async (e) => {
                e.preventDefault();
                setLoading(true);
                await seminarCol.doc(editingData.id).set({ ...editingData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                setIsModalOpen(false);
                setLoading(false);
            };

            if (!user) return <div className="min-h-screen flex items-center justify-center bg-slate-900"><button onClick={() => {const e = prompt("Email:"); const p = prompt("Password:"); if(e && p) auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));}} className="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black">SIGN IN</button></div>;

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 px-8 py-4 shadow-2xl sticky top-0 z-50 flex items-center justify-between">
                        <div className="flex items-center gap-6">
                            <h2 className="text-xl font-black text-white italic tracking-tighter uppercase">RTMS v12.5</h2>
                            <nav className="flex gap-2">
                                <button onClick={() => {setDupFilter(null); setSearchTerm('');}} className={`sidebar-btn ${!dupFilter ? 'active text-white' : 'text-slate-400'}`}>👤 รายชื่อ ({list.length})</button>
                            </nav>
                        </div>
                        <button onClick={() => auth.signOut()} className="text-rose-400 text-xs font-bold underline uppercase">Sign Out</button>
                    </header>

                    <main className="flex-1 p-10 relative">
                        {loading && <div className="fixed inset-0 bg-white/60 z-[200] flex items-center justify-center font-black animate-pulse text-indigo-600 uppercase text-lg">กำลังจัดการข้อมูล...</div>}
                        <div className="max-w-6xl mx-auto">
                            <header className="flex justify-between items-end mb-10">
                                <div><h3 className="text-3xl font-black text-slate-800 uppercase tracking-tight">{dupFilter ? '🚨 Checking Duplicates' : 'Participant List'}</h3></div>
                                <div className="flex gap-3">
                                    {dupFilter ? <button onClick={() => setDupFilter(null)} className="bg-slate-800 text-white px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-slate-700">⬅️ กลับหน้าหลัก</button> :
                                    <><input type="file" onChange={handleImportCSV} id="csv-in" className="hidden" accept=".csv" /><label htmlFor="csv-in" className="bg-amber-500 text-white px-8 py-4 rounded-2xl font-black text-xs cursor-pointer hover:bg-amber-600 shadow-xl transition-all uppercase">📥 Import CSV</label></>}
                                    {selectedIds.length > 0 && <button onClick={() => handleBatchDelete(selectedIds)} className="bg-rose-500 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-rose-600">🗑️ ลบที่เลือก ({selectedIds.length})</button>}
                                </div>
                            </header>

                            <div className="flex flex-col md:flex-row gap-4 mb-6">
                                <div className="flex-1 relative"><input className="input-box pl-10" placeholder="ค้นหาตามชื่อ, หน่วย, ID..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /><span className="absolute left-3 top-2.5 text-slate-400">🔍</span></div>
                                <div className="flex shrink-0">
<button 
    onClick={() => setDupFilter(dupFilter ? null : { dupOnly: true })} 
    className={`sort-btn flex items-center gap-2 ${dupFilter?.dupOnly ? 'active bg-orange-500 border-orange-500 text-white' : ''}`}
>
    {dupFilter?.dupOnly ? (
        // ✅ สถานะเมื่อกดดูค่าซ้ำอยู่: แสดงข้อความ "แสดงทั้งหมด" และไม่แสดงจำนวน
        "⚠️ แสดงทั้งหมด"
    ) : (
        // ✅ สถานะปกติ: แสดงข้อความ "แสดงซ้ำ XX รายการ"
        <>
            ⚠️ แสดงซ้ำ 
            <span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-[10px] font-bold mx-1">
                {listWithDupInfo.filter(i => i.isDupLocal).length}
            </span> 
            รายการ
        </>
    )}
</button>
                                </div>
                                <div className="flex gap-2 items-center"><span className="text-[10px] font-bold text-slate-400 uppercase">เรียงตาม:</span>
                                    <button onClick={() => requestSort('id')} className={`sort-btn ${sortConfig.key === 'id' ? 'active' : ''}`}>ID {sortConfig.key === 'id' && (sortConfig.direction === 'asc' ? '↑' : '↓')}</button>
                                    <button onClick={() => requestSort('ประทับเวลา')} className={`sort-btn ${sortConfig.key === 'ประทับเวลา' ? 'active' : ''}`}>เวลา {sortConfig.key === 'ประทับเวลา' && (sortConfig.direction === 'asc' ? '↑' : '↓')}</button>
                                    <button onClick={() => requestSort('เลขหน่วย')} className={`sort-btn ${sortConfig.key === 'เลขหน่วย' ? 'active' : ''}`}>หน่วย {sortConfig.key === 'เลขหน่วย' && (sortConfig.direction === 'asc' ? '↑' : '↓')}</button>
                                </div>
                            </div>

<div className="overflow-x-auto bg-white rounded-[1rem] shadow-sm border border-slate-200">
    <table className="w-full text-left text-sm border-collapse">
        <thead className="bg-slate-50 border-b text-[14px] font-black text-slate-400 uppercase tracking-widest">
            <tr>
                {/* Checkbox Header */}
                <th className="p-[0.4rem] w-[50px] md:w-[74px] text-center">
                    <input 
                        type="checkbox" 
                        className="w-4 h-4 rounded cursor-pointer" 
                        checked={selectedIds.length === processedList.length && processedList.length > 0} 
                        onChange={() => setSelectedIds(selectedIds.length === processedList.length ? [] : processedList.map(i => i.id))} 
                    />
                </th>
                <th className="p-[0.4rem] md:p-4 text-black">ผู้ลงทะเบียน</th>
                <th className="p-[0.4rem] md:p-4 text-black hidden md:table-cell">หน่วยงาน</th>
                <th className="p-[0.4rem] md:p-4 text-black text-center hidden sm:table-cell">เวลาประทับตรา</th>
                <th className="p-[0.4rem] md:p-4 text-black text-center">สถานะห้อง</th>
            </tr>
        </thead>
        <tbody className="divide-y font-bold text-slate-700">
            {processedList.map(i => (
                <React.Fragment key={i.id}>
                    {/* แถบแจ้งเตือนซ้ำ (ถ้ามี) */}
                    {i.isDupLocal && (
                        <tr className="bg-orange-50/50">
                            <td colSpan="5" className="p-0">
                                <div className="dup-top-bar" onClick={(e) => { e.stopPropagation(); setDupFilter(i); }}>
                                    <span className="text-[10px] md:text-xs">🚨 ซ้ำ: {i.dupReason} <span className="hidden sm:inline">(ประทับเวลา: {i.ประทับเวลา})</span></span>
                                    <span className="underline italic text-[10px]">คลิกเปรียบเทียบ 🔍</span>
                                </div>
                            </td>
                        </tr>
                    )}
                    
                    {/* แถวข้อมูลหลัก */}
                    <tr 
                        className="hover:bg-indigo-50/30 transition-colors cursor-pointer group" 
                        onClick={() => { setEditingData(i); setIsModalOpen(true); }}
                    >
                        {/* Checkbox Cell */}
                        <td className="p-[0.4rem] text-center" onClick={(e) => e.stopPropagation()}>
                            <input 
                                type="checkbox" 
                                checked={selectedIds.includes(i.id)} 
                                onChange={() => setSelectedIds(prev => prev.includes(i.id) ? prev.filter(x=>x!==i.id) : [...prev, i.id])} 
                                className="w-4 h-4 rounded cursor-pointer" 
                            />
                        </td>

                        {/* ชื่อผู้ลงทะเบียน (ในมือถือจะแสดง ID และ หน่วยงานพ่วงไปด้วย) */}
                        <td className="p-[0.4rem] md:p-4">
                            <div className="flex flex-col">
                                <span className="text-slate-900 group-hover:text-indigo-600 transition-colors">{i.rank} {i.firstName} {i.lastName}</span>
                                <div className="flex flex-wrap items-center gap-2 mt-0.5">
                                    <span className="text-[10px] text-slate-400 font-normal">ID: {i.id}</span>
                                    <span className="md:hidden text-[10px] text-indigo-400 font-normal truncate max-w-[150px]">{i.unitName}</span>
                                </div>
                            </div>
                        </td>

                        {/* หน่วยงาน (ซ่อนในมือถือ เพราะไปแสดงใต้ชื่อแล้ว) */}
                        <td className="p-[0.4rem] md:p-4 hidden md:table-cell">
                            <div className="flex flex-col">
                                <span>{i.unitName || "-"}</span>
                                <span className="text-[10px] text-indigo-400 font-normal uppercase">{i.region || "-"}</span>
                            </div>
                        </td>

                        {/* เวลาประทับตรา (ซ่อนในมือถือขนาดเล็ก) */}
                        <td className="p-[0.4rem] md:p-4 text-center text-slate-400 text-[10px] md:text-xs hidden sm:table-cell">
                            {i.ประทับเวลา || "-"}
                        </td>

                        {/* สถานะห้อง */}
                        <td className="p-[0.4rem] md:p-4 text-center">
                            <span className={`inline-block px-3 py-1 rounded-xl text-[10px] border whitespace-nowrap ${i.roomId ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                                {i.roomId || "รอจัด"}
                            </span>
                        </td>
                    </tr>
                </React.Fragment>
            ))}
        </tbody>
    </table>
</div>
                        </div>

                        {/* ✅ Modal 5 Section สมบูรณ์แบบตามตัวอย่างของคุณ */}
                        {isModalOpen && editingData && (
                            <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
                                <div className="bg-white rounded-3xl w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col animate-in zoom-in duration-300">
                                    <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10"><h2 className="text-xl font-bold uppercase tracking-tight">ข้อมูลผู้เข้าร่วมสัมมนา</h2><button onClick={() => setIsModalOpen(false)} className="text-slate-400 text-2xl">✕</button></div>
                                    <form onSubmit={handleSaveEdit} className="p-6 modal-scroll space-y-4 bg-[#f8fafc]">
                                        <div className="section-box bg-slate-50 border-dashed border-slate-300">
                                        <h3 className="section-title">0. ห้วงการสัมมนา</h3>
                                            <div className="flex gap-4">
                                                <div className="flex-1 flex items-center gap-2"><label className="text-[11px] font-bold text-slate-400 uppercase shrink-0">ปีสัมมนา:</label><input className="input-box font-bold border-indigo-200" placeholder="2567" value={editingData.seminarYear || ''} onChange={e => setEditingData({...editingData, seminarYear: e.target.value})} /></div>
                                                <div className="flex-1 flex items-center gap-2"><label className="text-[11px] font-bold text-slate-400 uppercase shrink-0">ผลัดที่:</label><input className="input-box font-bold border-indigo-200" placeholder="1" value={editingData.seminarPeriod || ''} onChange={e => setEditingData({...editingData, seminarPeriod: e.target.value})} /></div>
                                            </div>
                                        </div>
                                        <div className="section-box"><h3 className="section-title">1. หมวดข้อมูลหน่วย</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">กองทัพภาค</label><select className="input-box font-bold" value={editingData.region || ''} onChange={e => setEditingData({...editingData, region: e.target.value, unitName: ''})}>{['ทภ.1','ทภ.2','ทภ.3','ทภ.4','นขต.ทบ.'].map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">หน่วย</label><select className="input-box font-bold" value={editingData.unitName || ''} onChange={e => setEditingData({...editingData, unitName: e.target.value})}>{units.filter(u => !editingData.region || u.region === editingData.region).map(u => (<option key={u.id} value={`${u.id} : ${u.name}`}>{u.id} : {u.name}</option>))}</select></div>
                                            </div>
                                        </div>
                                        <div className="section-box"><h3 className="section-title">2. หมวดข้อมูลผู้ลงทะเบียน</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">ยศ</label><select className="input-box" value={editingData.rank || ''} onChange={e => setEditingData({...editingData, rank: e.target.value})}>{['พล.อ.', 'พล.ท.', 'พล.ต.', 'พ.อ.', 'พ.ท.', 'พ.ต.', 'ร.อ.', 'ร.ท.', 'ร.ต.', 'จ.ส.อ.', 'จ.ส.ท.', 'จ.ส.ต.', 'ส.อ.', 'ส.ท.', 'ส.ต.'].map(r => <option key={r} value={r}>{r}</option>)}</select></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block">ชื่อ</label><input className="input-box" value={editingData.firstName || ''} onChange={e => setEditingData({...editingData, firstName: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block">นามสกุล</label><input className="input-box" value={editingData.lastName || ''} onChange={e => setEditingData({...editingData, lastName: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block">ชื่อเล่น</label><input className="input-box" value={editingData.nickname || ''} onChange={e => setEditingData({...editingData, nickname: e.target.value})} /></div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">เบอร์โทร</label><input className="input-box" value={editingData.phone || ''} onChange={e => setEditingData({...editingData, phone: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">LINE ID</label><input className="input-box" value={editingData.lineId || ''} onChange={e => setEditingData({...editingData, lineId: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">ตำแหน่ง</label><input className="input-box" value={editingData.position || ''} onChange={e => setEditingData({...editingData, position: e.target.value})} /></div>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">กำเนิด</label><select className="input-box" value={editingData.origin || ''} onChange={e => setEditingData({...editingData, origin: e.target.value})}><option value="">เลือก</option><option value="นตท.">นตท.</option><option value="นนส.">นนส.</option><option value="อื่นๆ">อื่นๆ</option></select></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">กำเนิดอื่น</label><input className="input-box" value={editingData.originOther || ''} onChange={e => setEditingData({...editingData, originOther: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">รุ่น</label><input className="input-box" value={editingData.batch || ''} onChange={e => setEditingData({...editingData, batch: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 block uppercase">ปี พ.ศ.</label><input className="input-box" value={editingData.year || ''} onChange={e => setEditingData({...editingData, year: e.target.value})} /></div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mb-4 p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">นป. รุ่น (NP Batch)</label><input className="input-box" value={editingData.npBatch || ''} onChange={e => setEditingData({...editingData, npBatch: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">นป. ปี พ.ศ. (NP Year)</label><input className="input-box" value={editingData.npYear || ''} onChange={e => setEditingData({...editingData, npYear: e.target.value})} /></div>
                                            </div>
                                            <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">ประสบการณ์ฝึก</label><select className="input-box" value={editingData.trainingExp || 'ไม่เคยฝึก'} onChange={e => setEditingData({...editingData, trainingExp: e.target.value})}><option value="ไม่เคยฝึก">ไม่เคยฝึก</option><option value="1-2 ผลัด">1-2 ผลัด</option><option value="3-4 ผลัด">3-4 ผลัด</option><option value="มากกว่า 4 ผลัด">มากกว่า 4 ผลัด</option></select></div>
                                        </div>
                                        <div className="section-box"><h3 className="section-title">3. หมวดข้อมูลการเข้าพัก</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">การเดินทาง</label><select className="input-box" value={editingData.travelBy || 'รถรวม'} onChange={e => setEditingData({...editingData, travelBy: e.target.value})}><option value="รถรวม">รถรวม</option><option value="รถส่วนตัว">รถส่วนตัว</option></select></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">ความต้องการที่พัก</label><select className="input-box border-2 border-indigo-300" value={editingData.roomTypePref || 'พักรวม'} onChange={e => setEditingData({...editingData, roomTypePref: e.target.value})}><option value="พักรวม">พักรวม</option><option value="พักเดี่ยว">พักเดี่ยว</option></select></div>
                                            </div>
                                            <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">ข้อจำกัดด้านอาหาร</label><select className="input-box" value={editingData.dietary || 'ไม่มีข้อจำกัดด้านอาหาร'} onChange={e => setEditingData({...editingData, dietary: e.target.value})}><option value="ไม่มีข้อจำกัดด้านอาหาร">ไม่มีข้อจำกัดด้านอาหาร</option><option value="อาหารอิสลาม">อาหารอิสลาม</option><option value="มังสวิรัติ">มังสวิรัติ</option><option value="แพ้อาหารทะเล">แพ้อาหารทะเล</option></select></div>
                                        </div>
                                        <div className="section-box"><h3 className="section-title">4. หมายเหตุ</h3><textarea className="input-box h-24" placeholder="ระบุเพิ่มเติม..." value={editingData.remarks || ''} onChange={e => setEditingData({...editingData, remarks: e.target.value})}></textarea></div>
                                        <div className="section-box admin-section"><h3 className="section-title admin-title">5. หมวดผู้ดูแล</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">หมายเลขห้อง</label><input className="input-box" value={editingData.roomId || ''} onChange={e => setEditingData({...editingData, roomId: e.target.value})} /></div>
                                                <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">สิทธิ์เบิกจ่าย</label><select className="input-box" value={editingData.disbursement || 'เบิกไม่ได้'} onChange={e => setEditingData({...editingData, disbursement: e.target.value})}><option value="เบิกไม่ได้">เบิกไม่ได้</option><option value="เบิกได้">เบิกได้</option></select></div>
                                            </div>
                                            <div><label className="text-[11px] font-bold text-slate-400 uppercase mb-1 block">สถานะชำระเงิน</label><select className="input-box" value={editingData.paymentStatus || 'ยังไม่จ่าย'} onChange={e => setEditingData({...editingData, paymentStatus: e.target.value})}><option value="ยังไม่จ่าย">ยังไม่จ่าย</option><option value="จ่ายแล้ว">จ่ายแล้ว</option></select></div>
                                        </div>
                                        <div className="pb-8"><button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-sm shadow-xl hover:bg-indigo-700 active:scale-[0.98] transition-all">บันทึกข้อมูลสัมมนา</button></div>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
