// ── STABLE INPUT: local state, commit only on blur, never reset while focused ──
const StableInput = ({ value, onChange, className, placeholder, type = "text" }) => {
    const [local, setLocal] = useState(value ?? '');
    const isFocused = useRef(false);
    const lastExternal = useRef(value ?? '');

    // Only sync from parent when: not focused AND parent value truly changed from outside
    useEffect(() => {
        if (!isFocused.current && value !== lastExternal.current) {
            lastExternal.current = value ?? '';
            setLocal(value ?? '');
        }
    }, [value]);

    const handleFocus = () => { isFocused.current = true; };
    const handleChange = (e) => { setLocal(e.target.value); };
    const handleBlur = () => {
        isFocused.current = false;
        lastExternal.current = local;
        onChange(local);
    };
    return (
        <input
            type={type}
            className={className}
            value={local}
            placeholder={placeholder}
            onFocus={handleFocus}
            onChange={handleChange}
            onBlur={handleBlur}
        />
    );
};

// Color picker with stable input
const StableColorInput = ({ value, onChange, className }) => {
    const [local, setLocal] = useState(value);
    useEffect(() => { setLocal(value); }, [value]);
    return (
        <input
            type="color"
            className={className}
            value={local}
            onChange={e => { setLocal(e.target.value); onChange(e.target.value); }}
        />
    );
};

const QRCodeDisplay = ({ url, size = 180 }) => {
    const qrRef = useRef(null);
    const currentVersion = typeof qrVersion !== 'undefined' ? qrVersion : 'v2';

    useEffect(() => {
        if (!qrRef.current || !url) return;
        qrRef.current.innerHTML = '';
        try {
            new QRCode(qrRef.current, { 
                text: currentVersion === 'v2' ? `RTMS:${url}` : url, 
                width: size, 
                height: size, 
                colorDark: '#1e293b', 
                colorLight: '#ffffff', 
                correctLevel: QRCode.CorrectLevel.H 
            });
            const el = qrRef.current;
            ['img', 'canvas'].forEach(tag => { 
                const found = el.querySelector(tag); 
                if (found) found.style.borderRadius = '0px'; 
            });
        } catch(e) { console.error("QR Error:", e); }
    }, [url, size, currentVersion]);

    return <div ref={qrRef} className="qr-container flex items-center justify-center" style={{ borderRadius: '0px', overflow: 'hidden', lineHeight: '0' }} />;
};

// ──────────────────────────────────────────────
// DRAG-AND-DROP FIELD ORDER COMPONENT
// Fixed: (1) no Icon component → no flicker
//        (2) onDragOver preventDefault → drag works
//        (3) dragOver index tracked correctly
// ──────────────────────────────────────────────
const DraggableFieldList = ({ fieldDefs, visible, order, onToggle, onReorder, adminProfile }) => {
    const dragItem = useRef(null);
    const [dragOverIdx, setDragOverIdx] = useState(null);

    const orderedFields = (() => {
        const result = [...order].map(k => fieldDefs.find(f => f.key === k)).filter(Boolean);
        fieldDefs.forEach(f => { if (!order.includes(f.key)) result.push(f); });
        return result;
    })();

    const handleDragStart = (e, idx) => {
        dragItem.current = idx;
        e.dataTransfer.effectAllowed = 'move';
    };
    const handleDragOver = (e, idx) => {
        e.preventDefault(); // REQUIRED for drop to fire
        e.dataTransfer.dropEffect = 'move';
        setDragOverIdx(idx);
    };
    const handleDragLeave = () => { setDragOverIdx(null); };
    const handleDrop = (e, idx) => {
        e.preventDefault();
        setDragOverIdx(null);
        if (dragItem.current === null || dragItem.current === idx) { dragItem.current = null; return; }
        const newOrder = orderedFields.map(f => f.key);
        const [moved] = newOrder.splice(dragItem.current, 1);
        newOrder.splice(idx, 0, moved);
        dragItem.current = null;
        onReorder(newOrder);
    };
    const handleDragEnd = () => { setDragOverIdx(null); dragItem.current = null; };

    return (
        <div className="space-y-1">
            {orderedFields.map((f, idx) => {
                if (!adminProfile && f.adminOnly) return null;
                const isVisible = visible[f.key] !== false;
                const isOver = dragOverIdx === idx;
                return (
                    <div
                        key={f.key}
                        draggable
                        onDragStart={e => handleDragStart(e, idx)}
                        onDragOver={e => handleDragOver(e, idx)}
                        onDragLeave={handleDragLeave}
                        onDrop={e => handleDrop(e, idx)}
                        onDragEnd={handleDragEnd}
                        style={{cursor:'grab', userSelect:'none', transition:'background 0.1s'}}
                        className={`flex items-center justify-between gap-3 py-2 px-2 rounded-lg border ${isOver ? 'bg-indigo-50 border-indigo-300' : isVisible ? 'bg-white border-slate-200' : 'bg-slate-50 border-transparent opacity-50'}`}
                    >
                        {/* ── grip: plain text, no Icon component, no flicker ── */}
                        <span style={{fontSize:'14px',color:'#cbd5e1',flexShrink:0,lineHeight:1}}>⠿</span>
                        <div className="flex items-center gap-2 flex-1 min-w-0">
                            <span className="text-[11px] font-bold text-slate-700 truncate">{f.label}</span>
                            {f.adminOnly && <span className="text-[8px] font-bold bg-rose-50 text-rose-400 px-1 py-0.5 rounded shrink-0">Admin</span>}
                            <span className="text-[9px] text-slate-300 font-bold shrink-0">{f.section}</span>
                        </div>
                        <div
                            onMouseDown={e => e.stopPropagation()}
                            onClick={e => { e.stopPropagation(); onToggle(f.key); }}
                            className={`w-10 h-5 rounded-full transition-all relative cursor-pointer shrink-0 ${isVisible ? 'bg-indigo-500' : 'bg-slate-200'}`}
                        >
                            <div className={`w-4 h-4 bg-white rounded-full absolute top-0.5 transition-all shadow ${isVisible ? 'left-5' : 'left-0.5'}`}></div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
};

// ฟังก์ชันล้าง Logs (ระบุ userId เพื่อล้างรายบุคคล หรือไม่ระบุเพื่อล้างทั้งหมด)
const clearLogs = async (userId = null) => {
    const msg = userId ? `ยืนยันการล้างประวัติของ ${userId}?` : "ยืนยันการล้างประวัติกิจกรรมทั้งหมด? (ไม่สามารถกู้คืนได้)";
    if (!confirm(msg)) return;
    
    showStatus("กำลังดำเนินการ...");
    const batch = writeBatch();
    let query = baseRef('logs');
    if (userId) query = query.where('userId', '==', userId);
    
    const snap = await query.get();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    
    logAction("CLEAR_LOGS", userId ? `ลบประวัติของ: ${userId}` : "ลบประวัติทั้งหมด");
    showStatus("ล้างข้อมูลเรียบร้อยแล้ว");
};

    const hasPermission = (module) => {
        if (!adminProfile) return false;
        if (adminProfile.roles?.includes('SUPER_ADMIN')) return true;
        return adminProfile.roles?.includes(module);
    };

    const maskPhoneNumber = (phone) => {
        if (!phone || phone.length < 9) return phone;
        const p = phone.replace(/\D/g, '');
        if (p.length < 9) return phone;
        return `${p.substring(0, 3)}-XXX-${p.substring(p.length - 4)}`;
    };

    const formatPhone = (phone) => {
        if (!phone) return '-';
        const p = phone.replace(/\D/g, '');
        if (p.length !== 10) return phone;
        return `${p.substring(0, 3)}-${p.substring(3, 6)}-${p.substring(6)}`;
    };

    const processCSVText = async (text, collectionName) => {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const rows = [];
        let row = [], inQuotes = false, val = '';
        for (let i = 0; i < text.length; i++) {
            let char = text[i], nextChar = text[i+1];
            if (char === '"' && inQuotes && nextChar === '"') { val += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(val); val = ''; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                row.push(val); rows.push(row); row = []; val = '';
            } else { val += char; }
        }
        if (val || row.length > 0) { row.push(val); rows.push(row); }
        if (rows.length < 2) return showStatus("ไฟล์ CSV ไม่มีข้อมูลเพียงพอ");
        const headers = rows[0].map(h => h.trim());
        let count = 0, batch = writeBatch(), operations = 0;
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 0 || (rows[i].length === 1 && !rows[i][0])) continue;
            const data = {};
            let hasData = false;
            headers.forEach((h, index) => { let cellValue = rows[i][index]; if (cellValue !== undefined && h) { data[h] = cellValue; hasData = true; } });
            if (hasData) {
                let docId = data.id || data.docId;
                if (!docId) {
                    const prefix = collectionName === 'seminar' ? 'P' : (collectionName === 'guests' ? 'S' : collectionName.charAt(0).toUpperCase());
                    docId = `${prefix}${Date.now()}_${i}`;
                }
                delete data.id; delete data.docId;
                batch.set(baseRef(collectionName).doc(docId), data, { merge: true });
                count++; operations++;
                if (operations >= 490) { await batch.commit(); batch = writeBatch(); operations = 0; }
            }
        }
        if (operations > 0) await batch.commit();
        logAction(`IMPORT_${collectionName.toUpperCase()}`, `นำเข้า ${count} รายการ`);
        showStatus(`นำเข้าข้อมูล ${count} รายการเสร็จสิ้น`);
    };

const handleExportCSV = (collectionName) => {
    // 1. ดึงข้อมูลจาก State ตามประเภท (seminar, guests, units, rooms)
    let exportData = [];
    if (collectionName === 'seminar') exportData = seminar;
    else if (collectionName === 'guests') exportData = guests;
    else if (collectionName === 'units') exportData = units;
    else if (collectionName === 'rooms') exportData = rooms;
    
    // 2. ตรวจสอบว่ามีข้อมูลหรือไม่
    if (!exportData || exportData.length === 0) {
        showStatus("⚠️ ไม่พบข้อมูลสำหรับส่งออกในหมวด: " + collectionName);
        return;
    }

    let csvRows = [];

    // 3. Mapping หัวตารางภาษาไทยให้ตรงกับส่วน Import
    if (collectionName === 'seminar') {
        csvRows = exportData.map(item => ({
            "id": item.id || "",
            "ปีสัมมนา": item.seminarYear || "",
            "ผลัดที่": item.seminarPeriod || "",
            "ประทับเวลา": item.createdAt || "",
            "กองทัพภาค": item.region || "",
            "หน่วย": item.unitName || "",
            "ยศ": item.rank || "",
            "ชื่อ": item.firstName || "",
            "สกุล": item.lastName || "",
            "ชื่อเล่น": item.nickname || "",
            "เบอร์มือถือ": item.phone ? `="${item.phone}"` : "",
            "Line ID": item.lineId ? `="${item.lineId}"` : "",
            "ตำแหน่ง": item.position || "",
            "กำเนิด": item.origin || "",
            "กำเนิดอื่น": item.originOther || "",
            "รุ่น": item.batch || "",
            "ปี": item.year || "",
            "นป. รุ่น": item.npBatch || "",
            "นป. ปี": item.npYear || "",
            "ประสบการณ์การเป็นผู้ฝึกทหารใหม่": item.trainingExp || "",
            "การเดินทาง": item.travelBy || "",
            "การขอห้องพัก": item.roomTypePref || "",
            "ชำระห้องเดี่ยว": item.paymentStatus || "",
            "การรับประทานอาหาร": item.dietary || "",
            "หมายเหตุ": item.remarks || "",
            "roomID": item.roomId || "",
            "เบิก": item.disbursement || "",
            "อัพเดทล่าสุด": item.updatedAt || ""
        }));
    } else {
        // สำหรับหมวดอื่นให้ส่งออกตามโครงสร้างปกติ
        csvRows = exportData;
    }

    try {
        // 4. แปลงข้อมูลเป็น CSV (ต้องมั่นใจว่ามี Library PapaParse)
        if (typeof Papa === 'undefined') {
            showStatus("❌ ไม่พบ Library PapaParse ในหน้าเว็บ");
            return;
        }
        
        const csvString = Papa.unparse(csvRows);
        
        // 5. สร้างไฟล์ดาวน์โหลด + BOM (\ufeff) เพื่อให้ Excel อ่านภาษาไทยออก
        const blob = new Blob(["\ufeff" + csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        link.href = url;
        link.setAttribute('download', `${collectionName}_export.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // 6. แจ้งสถานะ (ส่งเฉพาะ String เพื่อแก้ปัญหา [object Object])
        showStatus(`✅ ส่งออกข้อมูล ${exportData.length} รายการสำเร็จ`);
        
    } catch (err) {
        console.error("Export Error:", err);
        showStatus("❌ เกิดข้อผิดพลาดในการสร้างไฟล์ CSV");
    }
};

// --- แก้ไข handleImportCSV ให้เป็นระบบ Preview ---
const handleImportCSV = (e, collectionName) => {
    const file = e.target.files[0];
    if (!file) return;
    showStatus("⏳ กำลังอ่านข้อมูลไฟล์...");
    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: (res) => {
            if (res.data.length === 0) return showStatus("❌ ไฟล์ว่างเปล่า");
            setImportTargetCol(collectionName);
            setImportPreviewData(res.data);
        }
    });
    e.target.value = null;
};

    const importFromGoogleSheet = async (sheetName) => {
        if (!confirm(`ยืนยันการดึงข้อมูลจาก Google Sheet: ${sheetName}?`)) return;
        showStatus(`กำลังดึงข้อมูล ${sheetName}...`);
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("ไม่สามารถอ่านข้อมูลได้");
            const csvText = await response.text();
            if (csvText.startsWith("<!DOCTYPE html>")) throw new Error("ไม่ได้รับอนุญาต");
            await processCSVText(csvText, sheetName);
        } catch (err) { showStatus("เกิดข้อผิดพลาด: " + err.message); }
    };

                                <td className="p-5 text-slate-400 font-mono whitespace-nowrap">{l.timestamp?.toDate?.()?.toLocaleString('th-TH') || '...'}</td>
                                <td className="p-5 font-bold text-slate-700">{l.userName}</td>
                                <td className="p-5"><span className={`px-2.5 py-1 rounded-lg text-[9px] font-black border uppercase ${(l.action || '').includes('DELETE') ? 'bg-rose-50 text-rose-600 border-rose-100' : (l.action || '').includes('ADD') ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-slate-100'}`}>{l.action}</span></td>
                                <td className="p-5 text-slate-500 leading-relaxed">{l.details}</td>
                                <td className="p-5 text-right"><button onClick={() => clearLogs(l.userId)} className="p-2 text-slate-300 hover:text-rose-500 transition-all"><Icon name="x-circle" size={16} /></button></td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
            {Math.ceil(logs.length / itemsPerPage) > 1 && (
                <div className="p-4 bg-slate-50 border-t flex justify-center items-center gap-4">
                    <button disabled={currentPage === 1} onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))} className="px-4 py-2 bg-white border rounded-xl text-[10px] font-bold shadow-sm disabled:opacity-30">ก่อนหน้า</button>
                    <span className="text-[10px] font-black">หน้า {currentPage}</span>
                    <button disabled={currentPage >= Math.ceil(logs.length / itemsPerPage)} onClick={() => setCurrentPage(prev => prev + 1)} className="px-4 py-2 bg-white border rounded-xl text-[10px] font-bold shadow-sm disabled:opacity-30">ถัดไป</button>
                </div>
            )}
        </div>
    </div>
)}

{/* ─── ส่วนที่ 2: ระบบบริหารจัดการบัตร (Card System) ─── */}
{adminSubTab === 'card_system' && (() => {
    const realSeminar = seminar.filter(s => !String(s.id).includes('_'));
    const realGuests = guests.filter(g => !String(g.id).includes('_'));
    const allPeople = [...realSeminar, ...realGuests];

    const filteredPeople = allPeople.filter(p => {
        const sTerm = printSearch.toLowerCase();
        return (
            (p.firstName || '').toLowerCase().includes(sTerm) ||
            (p.lastName || '').toLowerCase().includes(sTerm) ||
            (p.nickname || '').toLowerCase().includes(sTerm) ||
            (p.unit || '').toLowerCase().includes(sTerm) ||
            (p.unitName || '').toLowerCase().includes(sTerm) ||
            (p.guestUnit || '').toLowerCase().includes(sTerm) ||
            (p.region || '').toLowerCase().includes(sTerm) ||
            (p.position || '').toLowerCase().includes(sTerm)
        );
    });

    return (
        <div className="space-y-6 animate-in fade-in duration-500 pb-20 text-left">
            {/* 1. Header & Save Button */}
            <div className="flex items-center justify-between flex-wrap gap-3 bg-white p-4 rounded-2xl border shadow-sm">
                <div>
                    <h3 className="font-black uppercase tracking-widest text-slate-800 flex items-center gap-2">
                        <Icon name="credit-card" size={20} className="text-indigo-600"/> จัดการรูปแบบบัตรประจำตัว
                    </h3>
                    <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">ตั้งค่ารูปแบบบัตรและสั่งพิมพ์แบบกลุ่ม</p>
                </div>
                <button onClick={saveSettings} className={`px-6 py-3 rounded-xl text-[11px] font-black uppercase tracking-widest shadow-lg transition-all flex items-center gap-2 ${settingsDirty ? 'bg-indigo-600 text-white hover:bg-indigo-700 animate-pulse' : 'bg-slate-100 text-slate-500'}`}>
                    <Icon name="save" size={14} /> {settingsDirty ? 'บันทึกการเปลี่ยนแปลง' : 'ตั้งค่าปัจจุบัน'}
                </button>
            </div>

            <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                {/* 2. ฝั่งซ้าย: การตั้งค่า (แบบ Accordion) */}
                <div className="xl:col-span-5 space-y-3">
                    
                    {/* หมวดที่ 1: ข้อมูลโครงการ */}
                    <div className="bg-white border rounded-2xl overflow-hidden shadow-sm">
                        <button onClick={() => setOpenSection(openSection === 'info' ? null : 'info')} className="w-full bg-slate-50 px-5 py-3 flex justify-between items-center hover:bg-slate-100 transition-all text-[10px] font-black uppercase tracking-widest text-slate-600 border-b">
                            <div className="flex items-center gap-2"><Icon name="settings" size={14} className="text-indigo-600"/> 1. ข้อมูลโครงการและโลโก้</div>
                            <Icon name={openSection === 'info' ? "chevron-up" : "chevron-down"} size={12}/>
                        </button>
                        {openSection === 'info' && (
                            <div className="p-4 space-y-3 animate-in slide-in-from-top-1 duration-200">
                                <Field label="โลโก้หน่วยงาน (URL)">
                                    <input type="text" className="input-field text-xs" placeholder="วาง Link รูปโลโก้..." value={cardCfg.logoUrl || ''} onChange={e => { setCardCfg(c => ({ ...c, logoUrl: e.target.value })); setSettingsDirty(true); }}/>
                                </Field>
                                <Field label="ชื่องานหลัก"><StableInput className="input-field text-xs" value={cardCfg.eventName} onChange={v => { setCardCfg(c => ({ ...c, eventName: v })); setSettingsDirty(true); }} /></Field>
                                <Field label="ชื่อรอง"><StableInput className="input-field text-xs" value={cardCfg.eventSubName} onChange={v => { setCardCfg(c => ({ ...c, eventSubName: v })); setSettingsDirty(true); }} /></Field>
                            </div>
                        )}
                    </div>

                    {/* หมวดที่ 2: รูปแบบตัวอักษร (ย้ายขึ้นมา) */}
                    <div className="bg-white border rounded-2xl overflow-hidden shadow-sm">
                        <button onClick={() => setOpenSection(openSection === 'font' ? null : 'font')} className="w-full bg-slate-50 px-5 py-3 flex justify-between items-center hover:bg-slate-100 transition-all text-[10px] font-black uppercase tracking-widest text-slate-600 border-b">
                            <div className="flex items-center gap-2"><Icon name="type" size={14} className="text-indigo-600"/> 2. รูปแบบตัวอักษรและขนาด</div>
                            <Icon name={openSection === 'font' ? "chevron-up" : "chevron-down"} size={12}/>
                        </button>
                        {openSection === 'font' && (
                            <div className="p-4 space-y-4 animate-in slide-in-from-top-1 duration-200">
                                <div className="grid grid-cols-2 gap-2">
                                    {CARD_FONTS.map(f => (
                                        <button key={f.value} onClick={() => { setCardCfg(c => ({ ...c, font: f.value })); setSettingsDirty(true); }} className={`py-2 rounded-xl border font-bold text-xs ${cardCfg.font === f.value ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-white text-slate-600'}`} style={{fontFamily: f.css}}>{f.label}</button>
                                    ))}
                                </div>
                                <Field label={`ขนาดชื่อเล่น: ${cardCfg.nicknameFontSize}pt`}>
                                    <input type="range" min="36" max="96" step="2" value={cardCfg.nicknameFontSize} onChange={e => { setCardCfg(c => ({ ...c, nicknameFontSize: parseInt(e.target.value) })); setSettingsDirty(true); }} className="w-full accent-indigo-600" />
                                </Field>
                            </div>
                        )}
                    </div>

                    {/* หมวดที่ 3: ตั้งค่าสี (Header & Badge) */}
                    <div className="bg-white border rounded-2xl overflow-hidden shadow-sm">
                        <button onClick={() => setOpenSection(openSection === 'theme' ? null : 'theme')} className="w-full bg-slate-50 px-5 py-3 flex justify-between items-center hover:bg-slate-100 transition-all text-[10px] font-black uppercase tracking-widest text-slate-600 border-b">
                            <div className="flex items-center gap-2"><Icon name="palette" size={14} className="text-indigo-600"/> 3. ตั้งค่าสีและโทนสี</div>
                            <Icon name={openSection === 'theme' ? "chevron-up" : "chevron-down"} size={12}/>
                        </button>
                        {openSection === 'theme' && (
                            <div className="p-4 space-y-4 animate-in slide-in-from-top-1 duration-200">
                                <Field label="สีธีมหลัก (Header)">
                                    <div className="flex gap-2 mb-2">
                                        <StableColorInput className="w-8 h-8 rounded-lg cursor-pointer" value={cardCfg.cardBg} onChange={v => { setCardCfg(c => ({ ...c, cardBg: v })); setSettingsDirty(true); }} />
                                        <StableInput className="input-field font-mono text-[10px]" value={cardCfg.cardBg} onChange={v => { setCardCfg(c => ({ ...c, cardBg: v })); setSettingsDirty(true); }} />
                                    </div>
                                    <div className="flex gap-1.5 flex-wrap">
                                        {['#000000', '#1e3a8a', '#166534', '#991b1b', '#854d0e'].map(clr => (
                                            <button key={clr} onClick={() => { setCardCfg(c => ({ ...c, cardBg: clr })); setSettingsDirty(true); }} className="w-6 h-6 rounded-full border shadow-sm hover:scale-110 transition-all" style={{background: clr}}/>
                                        ))}
                                    </div>
                                </Field>
                                <Field label="สีตัด (Badge)">
                                    <div className="flex gap-2 mb-2">
                                        <StableColorInput className="w-8 h-8 rounded-lg cursor-pointer" value={cardCfg.accent} onChange={v => { setCardCfg(c => ({ ...c, accent: v })); setSettingsDirty(true); }} />
                                        <StableInput className="input-field font-mono text-[10px]" value={cardCfg.accent} onChange={v => { setCardCfg(c => ({ ...c, accent: v })); setSettingsDirty(true); }} />
                                    </div>
                                    <div className="flex gap-1.5 flex-wrap">
                                        {['#000000', '#4f46e5', '#10b981', '#ef4444', '#f59e0b'].map(clr => (
                                            <button key={clr} onClick={() => { setCardCfg(c => ({ ...c, accent: clr })); setSettingsDirty(true); }} className="w-6 h-6 rounded-full border shadow-sm hover:scale-110 transition-all" style={{background: clr}}/>
                                        ))}
                                    </div>
                                </Field>
                            </div>
                        )}
                    </div>
                </div>

                {/* 3. ฝั่งขวา: Preview & Table */}
                <div className="xl:col-span-7 space-y-6">
                    {/* Live Preview (ซ่อน/แสดงตามหมวดสี) */}
                    {openSection === 'theme' && (
                        <div className="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl border border-white/10 relative overflow-hidden animate-in zoom-in duration-300">
                            <h4 className="text-white/40 text-[10px] font-black uppercase tracking-[0.3em] mb-8 text-center">Live Identity Preview</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-start justify-items-center">
                                <div className="space-y-4">
                                    <span className="block text-center text-[9px] font-black text-indigo-400 uppercase tracking-widest bg-indigo-400/10 py-1 rounded-full">Seminar Badge</span>
                                    <div className="scale-90 origin-top shadow-2xl rounded-lg overflow-hidden"><CardPreview cardCfg={cardCfg} personType="seminar" /></div>
                                </div>
                                <div className="space-y-4">
                                    <span className="block text-center text-[9px] font-black text-emerald-400 uppercase tracking-widest bg-emerald-400/10 py-1 rounded-full">Staff Badge</span>
                                    <div className="scale-90 origin-top shadow-2xl rounded-lg overflow-hidden"><CardPreview cardCfg={cardCfg} personType="guest" /></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ตารางจัดการการพิมพ์ */}
                    <div className="bg-white border rounded-3xl overflow-hidden shadow-xl flex flex-col">
                        <div className="bg-slate-50 p-6 border-b space-y-4">
                            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <div>
                                    <h4 className="text-sm font-black uppercase tracking-widest text-slate-800">จัดการการพิมพ์บัตร</h4>
                                    <p className="text-[10px] text-slate-400 font-bold mt-1 uppercase">เลือกพิมพ์ตามกลุ่ม หรือเลือกรายบุคคลด้านล่าง</p>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {selectedIds.length > 0 && (
                                        <button onClick={() => setSelectedIds([])} className="px-4 py-2 bg-slate-200 text-slate-600 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-rose-500 hover:text-white transition-all">ยกเลิกการเลือก</button>
                                    )}
                                    <button onClick={() => printCards(realSeminar, 'seminar')} className="px-4 py-2 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600 hover:text-white transition-all">
                                        <Icon name="printer" size={14} className="inline mr-1.5"/> พิมพ์ผู้สัมมนา ({realSeminar.length})
                                    </button>
                                    <button onClick={() => printCards(realGuests, 'guests')} className="px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 hover:text-white transition-all">
                                        <Icon name="printer" size={14} className="inline mr-1.5"/> พิมพ์ Staff ({realGuests.length})
                                    </button>
                                    {selectedIds.length > 0 && (
                                        <button onClick={() => { const toPrint = allPeople.filter(p => selectedIds.includes(p.id)); printCards(toPrint, 'selected'); }} className="px-4 py-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase flex items-center gap-2 animate-in zoom-in">
                                            <Icon name="printer" size={14}/> พิมพ์ที่เลือก ({selectedIds.length})
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div className="relative">
                                <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="ค้นหาชื่อ, สังกัด..." className="w-full pl-11 pr-4 py-3 bg-white border-2 border-slate-200 rounded-2xl text-xs font-bold focus:border-indigo-500 outline-none" value={printSearch} onChange={(e) => setPrintSearch(e.target.value)} />
                            </div>
                        </div>

                        <div className="max-h-[600px] overflow-y-auto">
                            <table className="w-full text-left border-collapse">
                                <thead className="sticky top-0 bg-white z-10 shadow-sm border-b">
                                    <tr>
                                        <th className="p-4 w-12 text-center"><input type="checkbox" className="w-4 h-4 accent-indigo-600 cursor-pointer" onChange={(e) => { const visibleIds = filteredPeople.map(p => p.id); if(e.target.checked) setSelectedIds(prev => Array.from(new Set([...prev, ...visibleIds]))); else setSelectedIds(prev => prev.filter(id => !visibleIds.includes(id))); }} checked={filteredPeople.length > 0 && filteredPeople.every(p => selectedIds.includes(p.id))} /></th>
                                        <th className="p-4 text-[10px] font-black uppercase text-slate-400">ชื่อ-นามสกุล</th>
                                        <th className="p-4 text-[10px] font-black uppercase text-slate-400">ประเภท</th>
                                        <th className="p-4 text-[10px] font-black uppercase text-slate-400">สังกัด</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {filteredPeople.length > 0 ? filteredPeople.map(person => {
                                        const isSeminar = !!person.region;
                                        return (
                                            <tr key={person.id} className={`hover:bg-slate-50 transition-colors ${selectedIds.includes(person.id) ? 'bg-indigo-50/50' : ''}`}>
                                                <td className="p-4 text-center">
                                                    <input type="checkbox" className="w-4 h-4 accent-indigo-600 cursor-pointer" checked={selectedIds.includes(person.id)} onChange={() => setSelectedIds(prev => prev.includes(person.id) ? prev.filter(id => id !== person.id) : [...prev, person.id])} />
                                                </td>
                                                <td className="p-4">
                                                    <div className="text-xs font-black text-slate-700">{person.rank === 'อื่นๆ' ? (person.rankOther || 'ระบุยศ') : (person.rank || '')} {person.firstName} {person.lastName}</div>
                                                    <div className="text-[10px] text-indigo-500 font-black uppercase mt-0.5">{person.nickname || '-'}</div>
                                                </td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-0.5 rounded-lg text-[8px] font-black uppercase border ${isSeminar ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>{isSeminar ? 'ผู้เข้าร่วมสัมมนา' : 'กองอำนวยการ'}</span>
                                                </td>
                                                <td className="p-4">
                                                    <div className="text-[10px] font-black text-slate-600 uppercase">{isSeminar ? (person.unit || person.unitName || '-') : (person.guestUnit || '-')} {person.region ? ` (${person.region})` : ''}</div>
                                                    {!isSeminar && <div className="text-[9px] text-slate-400 font-bold italic mt-0.5">{person.position}</div>}
                                                </td>
                                            </tr>
                                        );
                                    }) : (
                                        <tr><td colSpan="4" className="p-10 text-center text-slate-300 font-black uppercase text-xs">ไม่พบรายชื่อที่ค้นหา</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
})()}

{/* ─── ส่วนที่ 3: นำเข้า/ส่งออก ─── */}
{adminSubTab === 'export' && (
    <div className="space-y-6">
        <div className="flex flex-col md:flex-row items-center justify-between bg-emerald-50 border border-emerald-200 p-5 rounded-2xl gap-4">
            <div>
                <h4 className="font-black text-emerald-800 uppercase tracking-widest text-sm flex items-center gap-2"><Icon name="table" size={18} /> Google Sheet</h4>
                <p className="text-[10px] text-emerald-600 mt-2">Export CSV หรือดึงข้อมูลจาก Sheet</p>
            </div>
            <a href={`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`} target="_blank" rel="noreferrer" className="whitespace-nowrap px-6 py-4 bg-emerald-600 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg flex items-center gap-2">
                <Icon name="external-link" size={14} /> เปิด Google Sheet
            </a>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {[
                { col: 'seminar', label: 'ผู้สัมมนา', ref: importSeminarRef },
                { col: 'units', label: 'หน่วย', ref: importUnitRef },
                { col: 'guests', label: 'กองอำนวยการ', ref: importGuestRef },
                { col: 'rooms', label: 'จัดที่พัก', ref: importRoomRef },
            ].map(({ col, label, ref }) => (
                <div key={col} className="w-full flex flex-col gap-2">
                    <button onClick={() => downloadTemplate(col)} className="w-full py-2 bg-indigo-50 text-indigo-600 border border-indigo-200 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-1.5"><Icon name="file-text" size={12} /> Template</button>
                    <button onClick={() => handleExportCSV(col)} className="w-full py-2.5 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest">ส่งออก</button>
                    <input type="file" accept=".csv" className="hidden" ref={ref} onChange={e => handleImportCSV(e, col)} />
                    <button onClick={() => ref.current.click()} className="w-full py-2.5 bg-white text-slate-500 border border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-widest">นำเข้า CSV</button>
                </div>
            ))}
        </div>
    </div>
)}

{/* ─── ส่วนที่ 4: กู้คืนข้อมูล ─── */}
{adminSubTab === 'restore' && (
    <div className="space-y-6">
        <div className="bg-rose-50 border border-rose-200 p-6 rounded-2xl text-rose-800 flex flex-col md:flex-row gap-6 items-center">
            <div className="flex-1">
                <h4 className="font-bold mb-2 flex items-center gap-2"><Icon name="alert-triangle" size={16} /> กู้คืนหน่วยงาน 297 หน่วย</h4>
                <p className="text-xs">เขียนทับข้อมูลหน่วยมาตรฐานทั้งหมด</p>
            </div>
            <button onClick={() => { if (confirm('ยืนยันการกู้คืน?')) seedUnits(); }} className="w-full md:w-auto bg-rose-600 text-white px-6 py-4 rounded-xl text-xs font-bold uppercase shadow-xl flex items-center justify-center gap-2"><Icon name="refresh-cw" size={14} /> กู้คืนฐานข้อมูล</button>
        </div>
    </div>
)}

{/* ─── ปิดท้าย Admin Management และรอยต่อ Dashboard ─── */}
</div>
) : activeSheet === 'dashboard' ? (() => {
    /* --- เริ่มต้นหน้า Dashboard --- */
    const realSeminar = seminar.filter(s=>!isMock(s));
    const mockSeminar = seminar.filter(s=>isMock(s));
    const realGuests  = guests.filter(g=>!isMock(g));
    const mockGuests  = guests.filter(g=>isMock(g));
    const allReal = [...realSeminar,...realGuests];
    const assignedReal = allReal.filter(p=>p.roomId);
    const withRoomPref = realSeminar.filter(s=>s.roomTypePref==='พักเดี่ยว');
    const paid = withRoomPref.filter(s=>s.paymentStatus==='จ่ายแล้ว');
    const canClaim = realSeminar.filter(s=>s.disbursement==='เบิกได้');
    const dietaryMap = {}, regionMap = {}, travelMap = {}, categoryMap = {};
    realSeminar.forEach(s=>{const d=s.dietary||'ไม่มีข้อจำกัด';dietaryMap[d]=(dietaryMap[d]||0)+1;});
    realSeminar.forEach(s=>{const r=s.region||'ไม่ระบุ';regionMap[r]=(regionMap[r]||0)+1;});
    realSeminar.forEach(s=>{const t=s.travelBy||'ไม่ระบุ';travelMap[t]=(travelMap[t]||0)+1;});
    realGuests.forEach(g=>{const c=g.category||'ไม่ระบุ';categoryMap[c]=(categoryMap[c]||0)+1;});
    
    const StatCard = ({label,value,sub,color='indigo',icon}) => (
        <div className="bg-white p-5 rounded-2xl border shadow-sm">
            <div className="flex items-start justify-between">
                <div>
                    <div className={`text-[10px] font-black uppercase tracking-widest text-${color}-400 mb-1`}>{label}</div>
                    <div className={`text-3xl font-black text-${color}-600 leading-none`}>{value}</div>
                    {sub && <div className="text-[10px] text-slate-400 font-bold mt-1">{sub}</div>}
                </div>
                <div className={`bg-${color}-50 p-3 rounded-xl`}><Icon name={icon} size={20} className={`text-${color}-500`}/></div>

                    ))}
                </tbody>
            </table>
        </div>

        <div className="flex gap-3 pt-2">
            <button onClick={() => setImportPreviewData(null)} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase text-xs">ยกเลิก</button>
            <button 
                onClick={async () => {
                    const batch = writeBatch();
                    const now = new Date().toLocaleString('th-TH');
                    const getVal = (row, keys) => {
                        for (let key of keys) {
                            if (row[key] !== undefined && row[key] !== null && row[key] !== "") return row[key].toString().trim();
                        }
                        return "";
                    };

                    importPreviewData.forEach(row => {
                        // --- นำ Logic Smart Mapping ของคุณมาใส่ตรงนี้ ---
                        const mappedData = {
                            id: getVal(row, ["id", "ID", "รหัส"]).toUpperCase(),
                            seminarYear: getVal(row, ["ปีสัมมนา", "seminarYear", "ปีที่สัมมนา"]), // เพิ่มใหม่
                            seminarPeriod: getVal(row, ["ผลัดที่", "period", "seminarPeriod"]), // เพิ่มใหม่
                            createdAt: getVal(row, ["ประทับเวลา", "สร้างเมื่อ", "createdAt"]),
                            updatedAt: now,
                            region: (() => {
                                const rawRegion = getVal(row, ["กองทัพภาค", "region"]);
                                if (rawRegion.includes("ทภ.1")) return "ทภ.1";
                                if (rawRegion.includes("ทภ.2")) return "ทภ.2";
                                if (rawRegion.includes("ทภ.3")) return "ทภ.3";
                                if (rawRegion.includes("ทภ.4")) return "ทภ.4";
                                if (rawRegion.includes("นขต.ทบ.")) return "นขต.ทบ.";
                                return rawRegion;
                            })(),
                            unitName: getVal(row, ["หน่วย", "unitName"]),
                            rank: getVal(row, ["ยศ", "rank"]),
                            firstName: getVal(row, ["ชื่อ", "firstName"]),
                            lastName: getVal(row, ["สกุล", "lastName"]),
                            nickname: getVal(row, ["ชื่อเล่น", "nickname"]),
                            phone: getVal(row, ["เบอร์มือถือ", "phone"]),
                            lineId: getVal(row, ["Line ID", "lineId"]),
                            position: getVal(row, ["ตำแหน่ง", "position"]),
                            origin: getVal(row, ["กำเนิด", "origin"]),
                            originOther: getVal(row, ["กำเนิดอื่น", "originOther"]),
                            batch: getVal(row, ["รุ่น", "batch"]),
                            year: getVal(row, ["ปี", "year", "ปี พ.ศ."]),
                            npBatch: getVal(row, ["นป. รุ่น", "npBatch"]),
                            npYear: getVal(row, ["นป. ปี", "npYear"]),
                            trainingExp: (() => {
                                const rawExp = getVal(row, ["ประสบการณ์ฝึก", "trainingExp"]);
                                if (rawExp.includes("ไม่เคย")) return "ไม่เคยฝึก";
                                if (rawExp.includes("1-2")) return "1-2 ผลัด";
                                if (rawExp.includes("3-4")) return "3-4 ผลัด";
                                return rawExp;
                            })(),
                            travelBy: (() => {
                                const rawTravel = getVal(row, ["การเดินทาง", "travelBy"]);
                                if (rawTravel.includes("รวม")) return "รถรวม";
                                if (rawTravel.includes("ส่วนตัว")) return "รถส่วนตัว";
                                return rawTravel || "รถรวม";
                            })(),
                            roomTypePref: (() => {
                                const rawRoom = getVal(row, ["การขอห้องพัก", "ห้องพัก", "roomTypePref"]);
                                if (rawRoom.includes("พักรวม")) return "พักรวม";
                                if (rawRoom.includes("เดี่ยว")) return "พักเดี่ยว";
                                return rawRoom || "พักรวม";
                            })(),
                            paymentStatus: getVal(row, ["ชำระห้องเดี่ยว", "paymentStatus"]) || "ยังไม่จ่าย",
                            dietary: getVal(row, ["การรับประทานอาหาร", "อาหาร", "dietary"]) || "ไม่มีข้อจำกัดด้านอาหาร",
                            remarks: getVal(row, ["หมายเหตุ", "remarks"]),
                            roomId: getVal(row, ["roomID", "roomId", "ห้องพัก"]),
                            disbursement: getVal(row, ["เบิก", "disbursement"]) || "เบิกไม่ได้"
                        };

                        if (mappedData.id) {
                            batch.set(baseRef(importTargetCol).doc(mappedData.id), mappedData, { merge: true });
                        }
                    });

                    await batch.commit();
                    logAction(`IMPORT_${importTargetCol.toUpperCase()}`, `นำเข้า ${importPreviewData.length} รายการ`);
                    setImportPreviewData(null);
                    showStatus("✅ นำเข้าข้อมูลสำเร็จ");
                }} 
                className="flex-[2] py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs shadow-xl"
            >
                ยืนยันการนำเข้าทั้งหมด
            </button>
        </div>
    </div>
</Modal>

            {statusMsg && (
                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-[10px] uppercase border border-white/10 text-center leading-relaxed max-w-[90vw]">
                    {statusMsg}
                </div>
            )}

{/* 🟢 Fullscreen QR Modal (รุ่นตรงโจทย์: ใช้ QRCodeDisplay ตัวเดิม) */}

{isFullscreenQrOpen && (
    <div className="fixed inset-0 bg-slate-900/95 z-[999] flex items-center justify-center p-6 animate-in fade-in duration-300" onClick={() => setIsFullscreenQrOpen(false)}>
        <div className="bg-white p-4 sm:p-8 shadow-2xl flex flex-col items-center relative animate-in zoom-in-95 duration-300 w-[95%] max-w-[400px]" onClick={e => e.stopPropagation()}>
            <button onClick={() => setIsFullscreenQrOpen(false)} className="absolute -top-5 -right-5 w-10 h-10 rounded-full bg-rose-500 text-white shadow-xl flex items-center justify-center z-10 hover:scale-110 transition-transform">
                <Icon name="x" size={20} />
            </button>
            <div className="bg-white rounded-[2rem] border-2 border-slate-50 shadow-sm overflow-hidden p-2">
                <QRCodeDisplay url={selectedPerson ? getPersonUrl(selectedPerson) : ""} size={320} />
            </div>
            <div className="mt-6 text-center w-full px-4">
                <div className="mb-3">
                    <span className={`px-3 py-1 rounded-full text-[10px] font-black tracking-widest border uppercase ${selectedPerson?.type === 'seminar' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-rose-50 text-rose-600 border-rose-100'}`}>
                        {selectedPerson?.type === 'seminar' ? 'ผู้เข้าร่วมสัมมนา' : 'กองอำนวยการ'} : {selectedPerson?.id}
                    </span>
                </div>
                <p className="text-xl font-black text-slate-800 leading-tight">
                    {(selectedPerson?.rank === 'อื่นๆ' ? selectedPerson?.rankOther : selectedPerson?.rank)} {selectedPerson?.firstName} {selectedPerson?.lastName} {selectedPerson?.nickname ? ` (${selectedPerson.nickname})` : ""}
                </p>
                <p className="text-[10px] font-bold text-slate-300 uppercase mt-5 tracking-tighter">แตะพื้นที่ว่างเพื่อกลับ</p>
            </div>
        </div>
    </div>
)}

            <footer className="p-8 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.4em] opacity-40">
                Stable Build 12.2.2 | Military Portal Integration
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
